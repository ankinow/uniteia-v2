<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <defs>
    <filter id="ink-bleed" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="glow-line" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="paper-texture" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="multiply"/>
    </filter>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0l6 4-6 4" fill="none" stroke="var(--color-cyan, oklch(0.78 0.16 195))" stroke-width="1.5"/>
    </marker>
    <marker id="arrow-coral" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0l6 4-6 4" fill="none" stroke="var(--color-coral, oklch(0.72 0.2 22))" stroke-width="1.5"/>
    </marker>
    <linearGradient id="grad-cyan-amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="var(--color-cyan, oklch(0.78 0.16 195))"/>
      <stop offset="100%" stop-color="var(--color-aether-amber, oklch(0.72 0.165 80))"/>
    </linearGradient>
    <linearGradient id="grad-indigo-teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="var(--color-aether-indigo, oklch(0.60 0.2 265))"/>
      <stop offset="100%" stop-color="var(--color-aether-teal, oklch(0.70 0.16 195))"/>
    </linearGradient>
    <path id="connector-arc" d="M0 0 Q 50 -20 100 0" fill="none"/>
    <path id="connector-s-curve" d="M0 0 C 30 0, 70 40, 100 40" fill="none"/>
    <path id="connector-arc-reverse" d="M0 0 Q 50 20 100 0" fill="none"/>
  </defs>
</svg>