      <line x1="14" y1="26" x2="18" y2="26" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </defs>
  <filter id="glow-neon" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="2" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
