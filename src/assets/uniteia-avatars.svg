      <path d="M16 2l4 8h8l-6 5 2 8-8-5-8 5 2-8-6-5h8z" fill="currentColor"/>
    </g>
    <g id="avatar-bulb">
      <path d="M16 4c-4.4 0-8 3.6-8 8 0 2.8 1.5 5.2 3.7 6.5l1.3.8V22h6v-2.7l1.3-.8A7.98 7.98 0 0024 12c0-4.4-3.6-8-8-8z" fill="currentColor"/>
