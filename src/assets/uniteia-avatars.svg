      <circle cx="12" cy="17" r="2" fill="var(--color-deep,#161b22)"/>
      <circle cx="20" cy="17" r="2" fill="var(--color-deep,#161b22)"/>
      <rect x="10" y="4" width="12" height="6" rx="3" fill="currentColor" opacity="0.6"/>
      <line x1="8" y1="28" x2="6" y2="32" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="24" y1="28" x2="26" y2="32" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </g>
    <g id="avatar-human">
      <circle cx="16" cy="12" r="6" fill="currentColor"/>
      <path d="M6 30c0-5.523 4.477-10 10-10s10 4.477 10 10" fill="currentColor"/>
    </g>
    <g id="avatar-builder">
      <rect x="6" y="12" width="20" height="18" rx="3" fill="currentColor"/>
      <rect x="10" y="6" width="12" height="8" rx="2" fill="currentColor" opacity="0.6"/>
      <circle cx="16" cy="22" r="8" fill="var(--color-deep,#161b22)" opacity="0.3"/>
      <circle cx="16" cy="12" r="3" fill="var(--color-deep,#161b22)"/>
    </g>
    <g id="avatar-thinker">
      <circle cx="16" cy="14" r="8" fill="currentColor"/>
      <rect x="8" y="22" width="16" height="10" rx="3" fill="currentColor"/>
      <path d="M10 26 Q16 30 22 26" fill="none" stroke="var(--color-deep,#161b22)" stroke-width="1.5"/>
      <circle cx="13" cy="13" r="2" fill="var(--color-deep,#161b22)" opacity="0.6"/>
      <circle cx="19" cy="13" r="2" fill="var(--color-deep,#161b22)" opacity="0.6"/>
    </g>
    <g id="avatar-neon">
      <rect x="4" y="4" width="24" height="24" rx="6" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <path d="M12 16l4-6 4 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M10 20h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="16" cy="12" r="2" fill="currentColor" filter="url(#glow-neon)"/>
    </g>
    <g id="avatar-badge">
      <path d="M16 2L20 8l7 1-5 5 1 7-7-3-7 3 1-7-5-5 7-1z" fill="currentColor"/>
      <circle cx="16" cy="14" r="4" fill="var(--color-deep,#161b22)"/>
