# Motion Contract
# Animation timing, per-component specs, reduced-motion enforcement.
# version: 1.0.0
# updated: 2026-05-12

timing_functions:
  ease-solar:
    value: "cubic-bezier(0.4, 0, 0.2, 1)"
    description: "Default easing — smooth, natural, solar gravity feel"
    used_by: ["transitions", "page loads", "card reveals"]
  ease-snap:
    value: "cubic-bezier(0.2, 0, 0, 1)"
    description: "Quick, precise — snaps into place with minimal overshoot"
    used_by: ["micro-interactions", "toggle states", "checkbox checks"]
  ease-bounce:
    value: "cubic-bezier(0.34, 1.56, 0.64, 1)"
    description: "Playful bounce — dopamine moments, rewards, celebrations"
    used_by: ["dopamine-whisper", "achievement pop-in", "handdraw strokes"]

duration:
  micro:
    value: "75ms"
    description: "Imperceptible delay, feedback for tiny actions"
    used_by: ["button press state", "checkbox toggle", "keypress ripple"]
  hover:
    value: "150ms"
    description: "Quick hover feedback, not distracting"
    used_by: ["card lift on hover", "link underline", "icon color shift"]
  transition:
    value: "300ms"
    description: "Standard UI transition between states"
    used_by: ["sidebar open/close", "tab switch", "modal enter/exit", "glass blur transition"]
  page:
    value: "500ms"
    description: "Page-level transitions, reveals, and entrances"
    used_by: ["Signal Grid fade-in", "hero reveal", "lesson content stagger-in"]

# ============================================
# Per-Component Animation Specs
# ============================================
animations:
  # ---- HOVER EVENTS ----
  depth-card-hover:
    trigger: hover
    duration: "150ms"
    easing: "ease-solar"
    properties:
      - "transform: translateY(-2px)"
      - "box-shadow: increased depth"
      - "border-color: var(--cyan) / 0.3"
    reduced_motion: "box-shadow only, no transform"

  glass-card-hover:
    trigger: hover
    duration: "150ms"
    easing: "ease-solar"
    properties:
      - "backdrop-filter: blur intensity +0.5x"
      - "border-color: var(--cyan) / 0.4"
    reduced_motion: "border-color only"

  sidebar-item-hover:
    trigger: hover
    duration: "75ms"
    easing: "ease-snap"
    properties:
      - "background: oklch(0.25 0.03 260 / 0.5)"
      - "transform: translateX(2px)"
    reduced_motion: "background only"

  # ---- ENTER EVENTS ----
  signal-grid-enter:
    trigger: page-enter
    duration: "500ms"
    easing: "ease-solar"
    properties:
      - "opacity: 0 -> 1"
      - "transform: translateY(8px) -> translateY(0)"
    stagger_children: true
    stagger_delay: "50ms"
    reduced_motion: "opacity 0 -> 1 only, 300ms"

  hero-reveal:
    trigger: page-enter
    duration: "500ms"
    easing: "ease-solar"
    properties:
      - "opacity: 0 -> 1"
      - "transform: translateY(16px) -> translateY(0)"
      - "filter: blur(4px) -> blur(0)"
    reduced_motion: "opacity 0 -> 1 only, 200ms"

  lesson-block-enter:
    trigger: scroll-enter
    duration: "300ms"
    easing: "ease-solar"
    properties:
      - "opacity: 0 -> 1"
      - "transform: translateY(12px) -> translateY(0)"
    stagger_children: true
    stagger_delay: "100ms"
    reduced_motion: "opacity 0 -> 1 only, 200ms"

  analogy-box-enter:
    trigger: scroll-enter
    duration: "300ms"
    easing: "ease-solar"
    properties:
      - "opacity: 0 -> 1"
      - "transform: scale(0.97) -> scale(1)"
    reduced_motion: "opacity 0 -> 1 only"

  handdraw-stroke-enter:
    trigger: scroll-enter
    duration: "800ms"
    easing: "ease-solar"
    properties:
      - "stroke-dashoffset: path-length -> 0"
    spec: "SVG path: stroke-dasharray = pathLength, stroke-dashoffset = pathLength, animation draw-stroke 800ms ease-solar forwards"
    reduced_motion: "no animation, render path fully drawn"

  dopamine-whisper:
    trigger: on-action-complete
    duration: "300ms"
    easing: "ease-bounce"
    properties:
      - "opacity: 0 -> 1"
      - "transform: scale(0.8) -> scale(1)"
      - "filter: brightness(1.2) -> brightness(1)"
    description: "Gentle celebration pulse after completing an action"
    reduced_motion: "opacity 0 -> 1 only, 150ms"

  # ---- EXIT EVENTS ----
  modal-exit:
    trigger: close
    duration: "200ms"
    easing: "ease-solar"
    properties:
      - "opacity: 1 -> 0"
      - "transform: scale(1) -> scale(0.95)"
      - "filter: blur(0) -> blur(2px)"
    reduced_motion: "opacity 1 -> 0 only, 100ms"

  sidebar-exit:
    trigger: close
    duration: "200ms"
    easing: "ease-snap"
    properties:
      - "transform: translateX(0) -> translateX(-100%)"
    reduced_motion: "opacity 1 -> 0"

  # ---- PAGE TRANSITIONS ----
  page-transition:
    trigger: route-change
    duration: "300ms"
    easing: "ease-solar"
    old_content:
      - "opacity: 1 -> 0"
      - "transform: translateY(0) -> translateY(-8px)"
    new_content:
      - "opacity: 0 -> 1"
      - "transform: translateY(8px) -> translateY(0)"
    reduced_motion: "instant swap, no animation"

  # ---- SIGNAL GRID ----
  signal-grid-node-pulse:
    trigger: ambient
    duration: "3000ms"
    easing: "ease-solar"
    properties:
      - "opacity: 0.2 -> 0.6 -> 0.2"
      - "box-shadow: 0 0 4px var(--cyan) -> 0 0 12px var(--cyan) -> 0 0 4px var(--cyan)"
    loop: true
    reduced_motion: "static, no pulse"

  signal-grid-connection-draw:
    trigger: page-enter
    duration: "1000ms"
    easing: "ease-solar"
    properties:
      - "stroke-dashoffset: path-length -> 0"
    reduced_motion: "render all connections fully drawn"

# ============================================
# Signal Grid Fade-In Spec
# ============================================
signal_grid_fade_in:
  phase_1_grid_backdrop:
    delay: "0ms"
    duration: "400ms"
    easing: "ease-solar"
    what: "Grid background opacity 0 -> 0.15"
  phase_2_connections:
    delay: "200ms"
    duration: "600ms"
    easing: "ease-solar"
    what: "Connection lines stroke-dashoffset animation"
  phase_3_nodes:
    delay: "400ms"
    duration: "500ms"
    easing: "ease-solar"
    what: "Nodes appear with scale 0 -> 1 and glow"
  phase_4_content_overlay:
    delay: "600ms"
    duration: "300ms"
    easing: "ease-solar"
    what: "Content overlay (glass) fades in on top of grid"
  reduced_motion:
    - "Skip all phases"
    - "Render final state instantly: grid visible, connections drawn, content visible"

# ============================================
# Handdraw Stroke Dasharray Spec
# ============================================
handdraw_stroke:
  technique:
    - "SVG path length is calculated via JS or hardcoded from design"
    - "stroke-dasharray = pathLength"
    - "stroke-dashoffset = pathLength"
    - "@keyframes draw-stroke { to { stroke-dashoffset: 0 } }"
    - "Animation runs on scroll-enter or page-enter"
  css_keyframes: |
    @keyframes draw-stroke {
      from { stroke-dashoffset: var(--path-length); }
      to   { stroke-dashoffset: 0; }
    }
    @keyframes draw-stroke-reduced {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  reduced_motion:
    - "stroke-dashoffset: 0 (fully drawn)"
    - "opacity 0 -> 1 in 150ms"

# ============================================
# Reduced Motion Enforcement
# ============================================
reduced_motion_enforcement:
  rules:
    - "Every animation must be wrapped in @media (prefers-reduced-motion: no-preference)"
    - "Must have a non-animated fallback rendering the final state"
    - "Must never rely on animation to convey critical information"
    - "Must be testable with prefers-reduced-motion: reduce in DevTools"
  css_pattern: |
    .signal-grid-node {
      opacity: 0.6;
      box-shadow: 0 0 4px var(--cyan);
      transition: box-shadow 300ms ease-solar;
    }
    @media (prefers-reduced-motion: no-preference) {
      .signal-grid-node {
        animation: pulse 3s ease-solar infinite;
      }
    }

# ============================================
# Anti-Patterns
# ============================================
anti_patterns:
  - "Animations that fire without reduced-motion guard"
  - "Hardcoded animation durations (must use tokens)"
  - "Animations that hide/show critical content (must be accessible)"
  - "Infinite loops on non-decorative elements"
  - "CSS transitions on layout properties (will-change: transform instead)"
  - "Dependencies on requestAnimationFrame for non-essential effects"
