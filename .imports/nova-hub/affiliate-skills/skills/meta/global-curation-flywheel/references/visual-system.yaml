## Componentes JRPG

### Status Card

```html
<div class="status-card">
  <div class="status-card__header">
    <span class="status-card__rank">S</span>
    <span class="status-card__name">[Product Name]</span>
  </div>
  <div class="status-card__stats">
    <div class="stat-row">
      <span class="stat-label">POWER</span>
      <div class="stat-bar">
        <div class="stat-fill" style="width: 82%"></div>
      </div>
      <span class="stat-value">8.2</span>
    </div>
    <!-- More stats -->
  </div>
  <div class="status-card__badges">
    <span class="badge badge--fire">TOP PICK</span>
    <span class="badge badge--ice">RECURRING</span>
  </div>
</div>
```

```css
.status-card {
  border: 2px solid var(--border);
  background: var(--surface);
  padding: var(--spacing-md);
}

.status-card__rank {
  font-family: var(--font-display);
  font-size: var(--text-2xl);
  font-weight: 700;
  color: var(--accent-primary);
  border: 2px solid var(--accent-primary);
  padding: 4px 12px;
}

.stat-bar {
  height: 8px;
  background: var(--border);
  border: 1px solid var(--border-strong);
}

.stat-fill {
  height: 100%;
  background: var(--gradient-primary);
}
```

### Stats Box

