## Layout Patterns

### Hero Panel

```yaml
hero_panel:
  layout: "split"  # left | right | split | centered
  
  elements:
    - type: "logo"
      size: "lg"
      
    - type: "headline"
      tag: "h1"
      font: "display"
      size: "4xl"
      
    - type: "subheadline"
      tag: "p"
      font: "body"
      size: "lg"
      
    - type: "screenshot"
      position: "right"
      border: true
      
    - type: "cta"
      style: "primary"
      icon: "arrow-right"
```

### Comparison Grid

```yaml
comparison_grid:
  columns: 3
  header_sticky: true
  
  cells:
    feature_name:
      align: left
      font: mono
      
    product_a:
      align: center
      highlight: conditional
      
    product_b:
      align: center
      highlight: conditional
      
    winner:
      badge: true
      icon: "crown"
```

### Category Map Panel

```yaml
category_map:
  layout: "mosaic"
  
  cards:
    - type: "featured"
      span: 2
      image: true
      
    - type: "standard"
      span: 1
      image: false
      
  filters:
    position: "top"
    style: "pill"
```

## Animacoes

```yaml
animations:
  transitions:
    fast: "150ms ease"
    normal: "300ms ease"
    slow: "500ms ease"
    
  hover:
    scale: "1.02"
    shadow: "var(--shadow-glow)"
    border_color: "var(--accent-primary)"
    
  scroll:
    fade_in: "opacity 0.5s ease"
    slide_up: "transform 0.5s ease, opacity 0.5s ease"
```

**RESTRICOES:**
- Nao usar animacoes infinitas (loading spinners ok)
- Hover apenas, nao autoplay
- Respeitar `prefers-reduced-motion`
- Performance first

## Responsividade

```yaml
responsive:
  mobile_first: true
  
  typography:
    mobile:
      h1: "1.875rem"
      h2: "1.5rem"
      body: "1rem"
    desktop:
      h1: "2.25rem"
      h2: "1.875rem"
      body: "1rem"
  
  layout:
    mobile: "single-column"
    tablet: "two-column"
    desktop: "multi-column"
    
  hide_on_mobile:
    - "decorative-elements"
    - "extended-nav"
```

## Accessibility

```yaml
accessibility:
  color_contrast:
    text_on_dark: ">= 4.5:1"
    text_on_light: ">= 4.5:1"
    
  focus:
    outline: "2px solid var(--accent-primary)"
    outline_offset: "2px"
    
  semantics:
    headings: "hierarchical"
    landmarks: "banner, main, contentinfo"
    aria_labels: "required for interactive"
    
  motion:
    respect_prefers_reduced_motion: true
```

## Dark Mode (Default)

Este sistema visual foi desenhado dark-first. Light mode e um futuro enhancement.

```yaml
dark_mode:
  default: true
  forced: false  # permite user toggle
  
  implementation:
    method: "css-variables"
    toggle: "system-preference"
```

## CSS Variables Complete

```css
:root {
  /* Colors */
  --color-bg: #0f0f0f;
  --color-surface: #1a1a2e;
  --color-surface-alt: #16213e;
  --color-text-primary: #f5f5f5;
  --color-text-secondary: #a0a0a0;
  --color-text-muted: #6b6b6b;
  --color-border: #2d2d2d;
  --color-border-strong: #404040;
  --color-accent: #e94560;
  --color-accent-secondary: #0f3460;
  
  /* Typography */
  --font-display: 'Space Grotesk', sans-serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  
  /* Spacing */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  
  /* Borders */
  --border-width: 2px;
  --border-radius-sm: 4px;
  --border-radius-md: 8px;
  
  /* Shadows */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.5);
  --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.4);
  --shadow-glow: 0 0 20px rgba(233, 69, 96, 0.2);
  
  /* Transitions */
  --transition-fast: 150ms ease;
  --transition-normal: 300ms ease;
}
```

## NAO FAZER

- ❌ Gradientes em tudo
- ❌ Bordas em tudo (usar com proposito)
- ❌ Icons por toda parte (texto e suficiente)
- ❌ Animacoes complexas
- ❌ Font weights > 700
- ❌ Cores neon excessivas
- ❌ "Gamer aesthetics" literais
- ❌ Skeuomorphism
- ❌ Flat design excessivo

## FAZER

- ✅ Hierarquia visual clara
- ✅ Bordas com proposito (separar secoes)
- ✅ Tipografia forte (display vs body)
- ✅ Contraste alto para legibilidade
- ✅ Espaco em branco generoso
- ✅ Grid firme e consistente
- ✅ Componentes JRPG como acento, nao tema
- ✅ Performance primeiro
