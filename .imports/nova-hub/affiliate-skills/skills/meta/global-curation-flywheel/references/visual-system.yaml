# Global Visual System — Brutalist/JRPG Clean

> Sistema visual canonico para sites de curadoria global. Combina estetica brutalista limpa com elementos de UI JRPG, criando identidade editorial forte sem parecer "gamer".

## Filosofia

**Nao fazer "site gamer". Fazer site editorial tecnico com linguagem visual inspirada em JRPG UI.**

O estilo brutalista/JRPG limpo prioriza:
- Clarity over decoration
- Function over fashion
- Consistency over variety
- Performance over animation

## Cores Base

```yaml
colors:
  base:
    background: "#0f0f0f"      # Preto grafite profundo
    surface: "#1a1a2e"        # Fundo de cards/paineis
    surface_alt: "#16213e"    # Variacao de superficie
    
    text_primary: "#f5f5f5"   # Off-white
    text_secondary: "#a0a0a0" # Cinza quente
    text_muted: "#6b6b6b"     # Cinza escuro
    
    border: "#2d2d2d"         # Bordas discretas
    border_strong: "#404040"  # Bordas enfatizadas
  
  accent:
    primary: "#e94560"        # Vermelho queimado (CTA principal)
    secondary: "#0f3460"      # Azul eletrico
    tertiary: "#533483"       # Roxo escuro
    
    success: "#10b981"        # Verde terminal
    warning: "#f59e0b"        # Laranja ferrugem
    error: "#ef4444"          # Vermelho erro
    info: "#3b82f6"           # Azul info
  
  derived:
    gradient_primary: "linear-gradient(135deg, #e94560, #533483)"
    gradient_surface: "linear-gradient(180deg, #1a1a2e 0%, #0f0f0f 100%)"
    glow_primary: "0 0 20px rgba(233, 69, 96, 0.3)"
```

