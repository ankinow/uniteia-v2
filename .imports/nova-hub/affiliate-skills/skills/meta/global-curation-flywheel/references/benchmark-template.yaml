    facilidade:
      weight: 0.20
      score: 9
      notes: "Onboarding <2min, template-based, intuitive"
      
    performance:
      weight: 0.20
      score: 8
      notes: "Generation ~2min for 30s video, 99.5% uptime"
      
    suporte:
      weight: 0.15
      score: 7
      notes: "Email + docs, response ~12h, community Discord"
      
    integracoes:
      weight: 0.20
