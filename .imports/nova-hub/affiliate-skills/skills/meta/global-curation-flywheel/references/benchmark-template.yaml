# Benchmark Template

# ============================================
# BENCHMARK TEMPLATE FOR PRODUCT EVALUATION
# ============================================

product:
  name: ""
  slug: ""
  official_url: ""
  category: ""

# ============================================
# EVALUATION DIMENSIONS (5-axis scoring)
# ============================================

dimensions:
  
  valor:
    weight: 0.25
    description: "Features/preco ratio, trial availability, guarantee"
    criteria:
      - "Free tier ou trial disponivel?"
      - "Preco competitivo vs alternativas?"
      - "Features justificam o custo?"
      - "Garantia ou refund policy?"
    score_range:
      9-10: "Exceptional value - free tier robusto, pricing abaixo de mercado"
      7-8: "Good value - trial disponivel, pricing competitive"
      5-6: "Average value - pricing standard, features basicas"
      3-4: "Below average - caro para o que oferece"
      1-2: "Poor value - overpriced ou features limitadas"

  facilidade:
    weight: 0.20
    description: "Onboarding speed, UX quality, documentation"
    criteria:
      - "Onboarding em <5 min?"
      - "Interface intuitiva?"
      - "Docs/tutoriais claros?"
      - "Learning curve baixa?"
    score_range:
      9-10: "Instant mastery - onboarding <2min, auto-explicativo"
      7-8: "Quick start - onboarding <5min, boa UX"
      5-6: "Standard - onboarding <15min, docs necessarios"
      3-4: "Steep - requer treinamento ou muitas tentativas"
      1-2: "Frustrating - UX confusa, onboarding complexo"

  performance:
    weight: 0.20
    description: "Speed, uptime, scalability"
    criteria:
      - "Load time <3s?"
      - "Uptime >99%?"
      - "Escalavel sem breaking changes?"
      - "API response time <500ms?"
    score_range:
      9-10: "Blazing fast - <1s load, 99.9%+ uptime, scale-proven"
      7-8: "Fast - <3s load, 99%+ uptime, handles scale"
      5-6: "Acceptable - <5s load, occasional slowdowns"
      3-4: "Slow - frequent slowdowns, reliability issues"
      1-2: "Unreliable - downtime, timeouts, crashes"

  suporte:
    weight: 0.15
    description: "Support channels, docs, community"
    criteria:
      - "Chat/email support?"
      - "Response time <24h?"
      - "Docs completos?"
      - "Community ativa?"
    score_range:
      9-10: "Premium support - live chat, <4h response, excelente docs"
      7-8: "Good support - email, <24h response, boa docs"
      5-6: "Standard - ticket system, 24-48h response"
      3-4: "Limited - email only, >48h response"
      1-2: "Poor - no support ou >1 week response"

  integracoes:
    weight: 0.20
    description: "APIs, plugins, workflows"
    criteria:
      - "API publica?"
      - "Zapier/Make integration?"
      - "Webhooks?"
      - "Native integrations?"
    score_range:
      9-10: "Integration paradise - API robusta, 50+ integrations, webhooks"
      7-8: "Well-connected - API solida, 20+ integrations"
      5-6: "Standard - API basica, <10 integrations"
      3-4: "Limited - poucas integrations, API restrita"
      1-2: "Isolated - sem API ou integrations"

# ============================================
# SCORING CALCULATION
# ============================================

scoring:
  formula: "weighted_average(dimensions)"
  display: "X.X/10"
  
  verdicts:
    strong_pick:
      threshold: 7.5
      label: "Strong Pick"
      description: "Highly recommended - great fit for most users"
      
    worth_testing:
      threshold: 6.0
      label: "Worth Testing"
      description: "Good option - try before committing"
      
    skip:
      threshold: 0
      label: "Skip"
      description: "Not recommended - better alternatives exist"

# ============================================
# COMPARISON TEMPLATE
# ============================================

comparison:
  template_type: "head-to-head"  # head-to-head | multi-product
  
  matrix:
    features:
      - name: ""
        product_a: ""
        product_b: ""
        winner: ""
        
    pricing:
      - tier: ""
        product_a: ""
        product_b: ""
        
    scores:
      - dimension: ""
        product_a: 0
        product_b: 0
        winner: ""

  winner_declaration:
    overall: ""
    best_for:
      - persona: ""
        recommendation: ""
      - persona: ""
        recommendation: ""

# ============================================
# BENCHMARK OUTPUT FORMAT
# ============================================

output:
  
  format_markdown: |
    ## [Product Name] Benchmark
    
    | Dimension | Score | Weight | Weighted |
    |-----------|-------|--------|----------|
    | Valor | X/10 | 25% | X.X |
    | Facilidade | X/10 | 20% | X.X |
    | Performance | X/10 | 20% | X.X |
    | Suporte | X/10 | 15% | X.X |
    | Integracoes | X/10 | 20% | X.X |
    | **Overall** | **X.X/10** | | |
    
    **Verdict**: [Strong Pick | Worth Testing | Skip]
    
    **Best For**: [specific persona/use case]
    
    ### vs [Competitor]
    [2-3 sentences comparing]

  format_yaml: |
    benchmark:
      product: [slug]
      scores:
        valor: X
        facilidade: X
        performance: X
        suporte: X
        integracoes: X
        overall: X.X
      verdict: "[Strong Pick | Worth Testing | Skip]"
      best_for: "[persona]"
      comparison:
        vs_[competitor]: "[comparison text]"

# ============================================
# DATA TRUST LEVELS
# ============================================

trust_levels:
  verified:
    - "Official product page"
    - "Pricing page"
    - "Feature documentation"
    
  trusted:
    - "List.affitor.com API data"
    - "G2/Capterra reviews (aggregated)"
    - "Product hunt launch data"
    
  untrusted:
    - "Random blog posts"
    - "Affiliate review sites (bias)"
    - "Social media comments"
    
  handling:
    use_verified_for: ["pricing", "features", "official_url"]
    use_trusted_for: ["scores", "benchmarks", "comparisons"]
    cross_reference: "Always verify untrusted with trusted/verified"

# ============================================
# REFRESH TRIGGERS
# ============================================

refresh:
  scheduled:
    interval: "monthly"
    
  triggers:
    - "Pricing change detected"
    - "Major feature release"
    - "Acquisition/funding news"
    - "Significant UI overhaul"
    - "Uptime incident >1hr"
    
  stale_threshold_days: 90

# ============================================
# EXAMPLE FILLED BENCHMARK
# ============================================

example:
  product:
    name: "HeyGen"
    slug: "heygen"
    official_url: "https://heygen.com"
    category: "AI Video Generation"
  
  dimensions:
    valor:
      weight: 0.25
