<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" role="img" aria-label="UniTeia wordmark — chrome monogram with cyan accent">
  <defs>
    <linearGradient id="chrome-h" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="oklch(0.85 0.02 75)" />
      <stop offset="45%" stop-color="oklch(0.55 0.02 75)" />
      <stop offset="55%" stop-color="oklch(0.35 0.02 75)" />
      <stop offset="100%" stop-color="oklch(0.18 0.02 75)" />
    </linearGradient>
    <linearGradient id="cyan-stroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="oklch(0.82 0.2 200)" />
      <stop offset="100%" stop-color="oklch(0.72 0.165 80)" />
    </linearGradient>
    <filter id="chrome-shadow">
      <feGaussianBlur stdDeviation="0.5" />
    </filter>
  </defs>

  {/* Monogram UT — outlined geometric, manga-ink clean */}
  <g transform="translate(8, 8)" fill="url(#chrome-h)" stroke="oklch(0.75 0.18 200)" stroke-width="0.8">
    {/* U shape — left half */}
    <path d="M 4 4 L 4 36 Q 4 44, 12 44 L 20 44 L 20 36 L 12 36 Q 12 36, 12 36 L 12 12 L 4 12 Z" />
    {/* T shape — right half, joined */}
    <path d="M 26 4 L 50 4 L 50 12 L 42 12 L 42 44 L 34 44 L 34 12 L 26 12 Z" />
  </g>

  {/* Wordmark: "UniTeia" in custom display */}
  <g font-family="'Dela Gothic One', 'Sora', sans-serif" font-size="22" font-weight="900" letter-spacing="-0.5">
    <text x="68" y="38" fill="url(#chrome-h)">Uni</text>
    <text x="118" y="38" fill="url(#cyan-stroke)">Teia</text>
  </g>

  {/* Suffix subtitle */}
  <text x="68" y="56" font-family="'JetBrains Mono', monospace" font-size="8" fill="oklch(0.6 0.02 75)" letter-spacing="2">CURATION · 8 LANG</text>

  {/* Y-sigil mark — small accent on right */}
  <g transform="translate(330, 18)" stroke="oklch(0.78 0.2 145)" stroke-width="1.2" fill="none">
    <line x1="0" y1="0" x2="0" y2="22" />
    <line x1="-6" y1="6" x2="6" y2="6" />
    <line x1="-4" y1="12" x2="4" y2="12" />
    <line x1="-2" y1="18" x2="2" y2="18" />
  </g>
</svg>
