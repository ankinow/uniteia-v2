  - slug: magica-mcp-server
    niche: apex
    tags:
      - magica
      - mcp
      - api
      - development
    verdict: trusted
    quality_score: 95
    locales:
      en:
        title: Building MCP Servers with Magica
        body: |-
          # Building MCP Servers with Magica

          ## What is MCP?

          The [Model Context Protocol](https://modelcontextprotocol.io) (MCP) is an open standard that lets AI agents discover and interact with external tools, data sources, and services through a standardized interface. Think of it as a USB-C port for AI — one protocol that any MCP-compatible agent can use to connect to any MCP-compatible server.

          Magica adopted MCP, originally developed by [Anthropic](https://anthropic.com), as its primary extension mechanism, meaning any MCP server you build automatically works with Magica's agent system.

          ## Setting Up an MCP Server

          Create a new directory and initialize a TypeScript project:

          ```bash
          mkdir magica-weather-mcp && cd magica-weather-mcp
          npm init -y
          npm install @modelcontextprotocol/sdk zod
          ```

          The MCP SDK provides the server framework. Your server exposes tools (actions the agent can take), resources (data the agent can read), and prompts (templates for common tasks).

          ## Defining Tools

          Tools are the most common MCP primitive. Here's a weather tool that Magica agents can call:

          ```typescript
          import { Server } from '@modelcontextprotocol/sdk/server/index.js'
          import { StdioServerTransport } from '@modelcontextprotocol/sdk/server/stdio.js'
          import { z } from 'zod'

          const server = new Server({ name: 'weather-mcp', version: '1.0.0' }, {
            capabilities: { tools: {} }
          })

          server.setRequestHandler('tools/list', async () => ({
            tools: [{
              name: 'get_weather',
              description: 'Get current weather for a city',
              inputSchema: {
                type: 'object',
                properties: { city: { type: 'string' } },
                required: ['city']
              }
            }]
          }))

          server.setRequestHandler('tools/call', async request => {
            if (request.params.name === 'get_weather') {
              const city = request.params.arguments?.city
              const weather = await fetchWeather(city)
              return { content: [{ type: 'text', text: JSON.stringify(weather) }] }
            }
            throw new Error('Tool not found')
          })

          const transport = new StdioServerTransport()
          await server.connect(transport)
          ```

          ## Connecting to Magica

          In your Magica workspace, go to Settings → MCP Servers → Add Server. Provide:

          - **Name:** A label for your server
          - **Command:** The command to start your server (e.g., `node dist/index.js`)
          - **Arguments:** Any CLI flags your server needs
          - **Environment variables:** API keys, database URLs, etc.

          Once added, Magica agents can discover and call your tools automatically. When an agent determines it needs data or an action your server provides, it makes the MCP call transparently.

          ## Resources and Context

          Beyond tools, MCP servers can expose Resources — data that agents can read. Resources use a URI-based addressing scheme:

          ```typescript
          server.setRequestHandler('resources/list', async () => ({
            resources: [{
              uri: 'docs://magica/workflows',
              name: 'Workflow Documentation',
              mimeType: 'text/markdown'
            }]
          }))
          ```

          Resources are useful for giving agents access to documentation, schemas, reference data, and configuration files that inform their responses.

          ## Deployment

          For development, run your MCP server locally with stdio transport. For production, deploy as an HTTP server with SSE transport or via [Cloudflare Pages](https://pages.cloudflare.com) for a serverless approach:

          ```typescript
          import { SSEServerTransport } from '@modelcontextprotocol/sdk/server/sse.js'
          import express from 'express'

          const app = express()
          app.get('/sse', async (req, res) => {
            const transport = new SSEServerTransport('/messages', res)
            await server.connect(transport)
          })
          app.post('/messages', (req, res) => {
            transport.handlePostMessage(req, res)
          })
          app.listen(3000)
          ```

          ## Advanced: Building a Composite MCP Server

          For complex scenarios, build servers that compose multiple data sources:

          - **Database MCP:** Expose SQL queries as tools with schema-aware validation
          - **GitHub MCP:** Combine Issues API, PR API, and Actions API into unified tools
          - **Multi-step agents:** Chain MCP calls where one tool's output becomes another's input

          Magica's agent system handles the orchestration — your MCP server just needs to expose clean, well-documented tools with typed schemas, following principles from Google's [PAIR Guidebook](https://pair.withgoogle.com/guidebook) on human-AI collaboration. The platform takes care of retries, error handling, and routing between servers.

          <dcp-message-id>m0325</dcp-message-id>
      pt:
        title: Construindo Servidores MCP com Magica
        body: |-
          # Construindo Servidores MCP com Magica

          ## O que é MCP?

          O [Model Context Protocol](https://modelcontextprotocol.io) (MCP) é um padrão aberto que permite que agentes de IA descubram e interajam com ferramentas externas, fontes de dados e serviços através de uma interface padronizada. Pense nisso como uma porta USB-C para IA — um protocolo que qualquer agente compatível com MCP pode usar para se conectar a qualquer servidor compatível com MCP.

          Magica adotou o MCP, originalmente desenvolvido pela [Anthropic](https://anthropic.com), como seu principal mecanismo de extensão, significando que qualquer servidor MCP que você construir funciona automaticamente com o sistema de agente da Magica.

          ## Configurando um Servidor MCP

          Crie um novo diretório e inicialize um projeto TypeScript:

          ```bash
          mkdir magica-weather-mcp && cd magica-weather-mcp
          npm init -y
          npm install @modelcontextprotocol/sdk zod
          ```

          O SDK MCP fornece a estrutura do servidor. Seu servidor expõe ferramentas (ações que o agente pode tomar), recursos (dados que o agente pode ler) e prompts (modelos para tarefas comuns).

          ## Definindo Ferramentas

          Ferramentas são a primitiva MCP mais comum. Aqui está uma ferramenta de clima que os agentes da Magica podem chamar:

          ```typescript
          import { Server } from '@modelcontextprotocol/sdk/server/index.js'
          import { StdioServerTransport } from '@modelcontextprotocol/sdk/server/stdio.js'
          import { z } from 'zod'

          const server = new Server({ name: 'weather-mcp', version: '1.0.0' }, {
            capabilities: { tools: {} }
          })

          server.setRequestHandler('tools/list', async () => ({
            tools: [{
              name: 'get_weather',
              description: 'Get current weather for a city',
              inputSchema: {
                type: 'object',
                properties: { city: { type: 'string' } },
                required: ['city']
              }
            }]
          }))

          server.setRequestHandler('tools/call', async request => {
            if (request.params.name === 'get_weather') {
              const city = request.params.arguments?.city
              const weather = await fetchWeather(city)
              return { content: [{ type: 'text', text: JSON.stringify(weather) }] }
            }
            throw new Error('Tool not found')
          })

          const transport = new StdioServerTransport()
          await server.connect(transport)
          ```

          ## Conectando-se à Magica

          No seu workspace Magica, vá em Configurações → Servidores MCP → Adicionar Servidor. Forneça:

          - **Nome:** Um rótulo para seu servidor
          - **Comando:** O comando para iniciar seu servidor (por exemplo, `node dist/index.js`)
          - **Argumentos:** Quaisquer flags de CLI que seu servidor precise
          - **Variáveis de ambiente:** Chaves de API, URLs de banco de dados, etc.

          Uma vez adicionados, os agentes da Magica podem descobrir e chamar suas ferramentas automaticamente. Quando um agente determina que precisa de dados ou uma ação que seu servidor fornece, ele faz a chamada MCP de forma transparente.

          ## Recursos e Contexto

          Além de ferramentas, os servidores MCP podem expor Recursos — dados que os agentes podem ler. Os Recursos usam um esquema de endereçamento baseado em URI:

          ```typescript
          server.setRequestHandler('resources/list', async () => ({
            resources: [{
              uri: 'docs://magica/workflows',
              name: 'Workflow Documentation',
              mimeType: 'text/markdown'
            }]
          }))
          ```

          Recursos são úteis para dar aos agentes acesso a documentação, esquemas, dados de referência e arquivos de configuração que informam suas respostas.

          ## Implantação

          Para desenvolvimento, execute seu servidor MCP localmente com transporte stdio. Para produção, implante como um servidor HTTP com transporte SSE ou via [Cloudflare Pages](https://pages.cloudflare.com) para uma abordagem serverless:

          ```typescript
          import { SSEServerTransport } from '@modelcontextprotocol/sdk/server/sse.js'
          import express from 'express'

          const app = express()
          app.get('/sse', async (req, res) => {
            const transport = new SSEServerTransport('/messages', res)
            await server.connect(transport)
          })
          app.post('/messages', (req, res) => {
            transport.handlePostMessage(req, res)
          })
          app.listen(3000)
          ```

          ## Avançado: Construindo um Servidor MCP Composto

          Para cenários complexos, construa servidores que compõem múltiplas fontes de dados:

          - **MCP de Banco de Dados:** Exponha consultas SQL como ferramentas com validação ciente de esquema
          - **MCP do GitHub:** Combine a API de Issues, API de PRs e API de Actions em ferramentas unificadas
          - **Agentes de múltiplas etapas:** Encadeie chamadas MCP onde a saída de uma ferramenta se torna a entrada de outra

          O sistema de agente da Magica lida com a orquestração — seu servidor MCP só precisa expor ferramentas limpas e bem documentadas com esquemas tipados, seguindo princípios do [PAIR Guidebook](https://pair.withgoogle.com/guidebook) da Google sobre colaboração humano-IA. A plataforma cuida de repetições, tratamento de erros e roteamento entre servidores.
      es:
        title: Construyendo Servidores MCP con Magica
        body: |-
          # Construyendo Servidores MCP con Magica

          ## ¿Qué es MCP?

          El [Model Context Protocol](https://modelcontextprotocol.io) (MCP) es un estándar abierto que permite a los agentes de IA descubrir e interactuar con herramientas externas, fuentes de datos y servicios a través de una interfaz estandarizada. Piense en él como un puerto USB-C para IA — un protocolo que cualquier agente compatible con MCP puede usar para conectarse a cualquier servidor compatible con MCP.

          Magica adoptó MCP, desarrollado originalmente por [Anthropic](https://anthropic.com), como su mecanismo principal de extensión, lo que significa que cualquier servidor MCP que construyas funciona automáticamente con el sistema de agentes de Magica.

          ## Configurando un Servidor MCP

          Crea un nuevo directorio e inicializa un proyecto TypeScript:

          ```bash
          mkdir magica-weather-mcp && cd magica-weather-mcp
          npm init -y
          npm install @modelcontextprotocol/sdk zod
          ```

          El SDK de MCP proporciona el marco del servidor. Tu servidor expone herramientas (acciones que el agente puede realizar), recursos (datos que el agente puede leer) y prompts (plantillas para tareas comunes).

          ## Definiendo Herramientas

          Las herramientas son la primitiva MCP más común. Aquí hay una herramienta meteorológica que los agentes de Magica pueden llamar:

          ```typescript
          import { Server } from '@modelcontextprotocol/sdk/server/index.js'
          import { StdioServerTransport } from '@modelcontextprotocol/sdk/server/stdio.js'
          import { z } from 'zod'

          const server = new Server({ name: 'weather-mcp', version: '1.0.0' }, {
            capabilities: { tools: {} }
          })

          server.setRequestHandler('tools/list', async () => ({
            tools: [{
              name: 'get_weather',
              description: 'Get current weather for a city',
              inputSchema: {
                type: 'object',
                properties: { city: { type: 'string' } },
                required: ['city']
              }
            }]
          }))

          server.setRequestHandler('tools/call', async request => {
            if (request.params.name === 'get_weather') {
              const city = request.params.arguments?.city
              const weather = await fetchWeather(city)
              return { content: [{ type: 'text', text: JSON.stringify(weather) }] }
            }
            throw new Error('Tool not found')
          })

          const transport = new StdioServerTransport()
          await server.connect(transport)
          ```

          ## Conectando a Magica

          En tu espacio de trabajo de Magica, ve a Configuración → Servidores MCP → Añadir Servidor. Proporciona:

          - **Nombre:** Una etiqueta para tu servidor
          - **Comando:** El comando para iniciar tu servidor (por ejemplo, `node dist/index.js`)
          - **Argumentos:** Cualquier bandera de CLI que tu servidor necesite
          - **Variables de entorno:** Claves de API, URLs de base de datos, etc.

          Una vez agregado, los agentes de Magica pueden descubrir y llamar a tus herramientas automáticamente. Cuando un agente determina que necesita datos o una acción que tu servidor proporciona, realiza la llamada MCP de manera transparente.

          ## Recursos y Contexto

          Más allá de las herramientas, los servidores MCP pueden exponer Recursos — datos que los agentes pueden leer. Los recursos utilizan un esquema de direccionamiento basado en URI:

          ```typescript
          server.setRequestHandler('resources/list', async () => ({
            resources: [{
              uri: 'docs://magica/workflows',
              name: 'Workflow Documentation',
              mimeType: 'text/markdown'
            }]
          }))
          ```

          Los recursos son útiles para dar a los agentes acceso a documentación, esquemas, datos de referencia y archivos de configuración que informan sus respuestas.

          ## Despliegue

          Para desarrollo, ejecuta tu servidor MCP localmente con transporte stdio. Para producción, despliega como un servidor HTTP con transporte SSE o mediante [Cloudflare Pages](https://pages.cloudflare.com) para un enfoque serverless:

          ```typescript
          import { SSEServerTransport } from '@modelcontextprotocol/sdk/server/sse.js'
          import express from 'express'

          const app = express()
          app.get('/sse', async (req, res) => {
            const transport = new SSEServerTransport('/messages', res)
            await server.connect(transport)
          })
          app.post('/messages', (req, res) => {
            transport.handlePostMessage(req, res)
          })
          app.listen(3000)
          ```

          ## Avanzado: Construyendo un Servidor MCP Compuesto

          Para escenarios complejos, construye servidores que compongan múltiples fuentes de datos:

          - **Base de datos MCP:** Expone consultas SQL como herramientas con validación consciente del esquema
          - **GitHub MCP:** Combina la API de Issues, la API de PR y la API de Actions en herramientas unificadas
          - **Agentes multipaso:** Encadena llamadas MCP donde la salida de una herramienta se convierte en la entrada de otra

          El sistema de agentes de Magica maneja la orquestación — tu servidor MCP solo necesita exponer herramientas limpias, bien documentadas con esquemas tipados, siguiendo principios del [PAIR Guidebook](https://pair.withgoogle.com/guidebook) de Google sobre colaboración humano-IA. La plataforma se encarga de reintentos, manejo de errores y enrutamiento entre servidores.
      fr:
        title: Construire des Serveurs MCP avec Magica
        body: |-
          # Construire des serveurs MCP avec Magica

          ## Qu'est-ce que MCP ?

          Le [Model Context Protocol](https://modelcontextprotocol.io) (MCP) est un standard ouvert qui permet aux agents IA de découvrir et d'interagir avec des outils externes, des sources de données et des services via une interface standardisée. Considérez-le comme un port USB-C pour l'IA — un protocole que tout agent compatible MCP peut utiliser pour se connecter à n'importe quel serveur compatible MCP.

          Magica a adopté MCP, initialement développé par [Anthropic](https://anthropic.com), comme mécanisme d'extension principal, ce qui signifie que tout serveur MCP que vous construisez fonctionne automatiquement avec le système d'agents de Magica.

          ## Configuration d'un serveur MCP

          Créez un nouveau répertoire et initialisez un projet TypeScript :

          ```bash
          mkdir magica-weather-mcp && cd magica-weather-mcp
          npm init -y
          npm install @modelcontextprotocol/sdk zod
          ```

          Le SDK MCP fournit le cadre du serveur. Votre serveur expose des outils (actions que l'agent peut entreprendre), des ressources (données que l'agent peut lire) et des invites (modèles pour des tâches courantes).

          ## Définition des outils

          Les outils sont la primitive MCP la plus courante. Voici un outil météo que les agents Magica peuvent appeler :

          ```typescript
          import { Server } from '@modelcontextprotocol/sdk/server/index.js'
          import { StdioServerTransport } from '@modelcontextprotocol/sdk/server/stdio.js'
          import { z } from 'zod'

          const server = new Server({ name: 'weather-mcp', version: '1.0.0' }, {
            capabilities: { tools: {} }
          })

          server.setRequestHandler('tools/list', async () => ({
            tools: [{
              name: 'get_weather',
              description: 'Get current weather for a city',
              inputSchema: {
                type: 'object',
                properties: { city: { type: 'string' } },
                required: ['city']
              }
            }]
          }))

          server.setRequestHandler('tools/call', async request => {
            if (request.params.name === 'get_weather') {
              const city = request.params.arguments?.city
              const weather = await fetchWeather(city)
              return { content: [{ type: 'text', text: JSON.stringify(weather) }] }
            }
            throw new Error('Tool not found')
          })

          const transport = new StdioServerTransport()
          await server.connect(transport)
          ```

          ## Connexion à Magica

          Dans votre espace de travail Magica, allez dans Paramètres → Serveurs MCP → Ajouter un serveur. Fournissez :

          - **Nom :** Un libellé pour votre serveur
          - **Commande :** La commande pour démarrer votre serveur (par exemple, `node dist/index.js`)
          - **Arguments :** Tous les indicateurs CLI dont votre serveur a besoin
          - **Variables d'environnement :** Clés API, URL de base de données, etc.

          Une fois ajouté, les agents Magica peuvent découvrir et appeler vos outils automatiquement. Lorsqu'un agent détermine qu'il a besoin de données ou d'une action que votre serveur fournit, il effectue l'appel MCP de manière transparente.

          ## Ressources et contexte

          Au-delà des outils, les serveurs MCP peuvent exposer des ressources — des données que les agents peuvent lire. Les ressources utilisent un schéma d'adressage basé sur les URI :

          ```typescript
          server.setRequestHandler('resources/list', async () => ({
            resources: [{
              uri: 'docs://magica/workflows',
              name: 'Workflow Documentation',
              mimeType: 'text/markdown'
            }]
          }))
          ```

          Les ressources sont utiles pour donner aux agents un accès à la documentation, aux schémas, aux données de référence et aux fichiers de configuration qui informent leurs réponses.

          ## Déploiement

          Pour le développement, exécutez votre serveur MCP localement avec le transport stdio. Pour la production, déployez-le en tant que serveur HTTP avec le transport SSE ou via [Cloudflare Pages](https://pages.cloudflare.com) pour une approche serverless :

          ```typescript
          import { SSEServerTransport } from '@modelcontextprotocol/sdk/server/sse.js'
          import express from 'express'

          const app = express()
          app.get('/sse', async (req, res) => {
            const transport = new SSEServerTransport('/messages', res)
            await server.connect(transport)
          })
          app.post('/messages', (req, res) => {
            transport.handlePostMessage(req, res)
          })
          app.listen(3000)
          ```

          ## Avancé : Construction d'un serveur MCP composite

          Pour des scénarios complexes, construisez des serveurs qui composent plusieurs sources de données :

          - **Base de données MCP :** Exposez des requêtes SQL en tant qu'outils avec validation consciente du schéma
          - **GitHub MCP :** Combinez l'API Issues, l'API PR et l'API Actions en outils unifiés
          - **Agents multi-étapes :** Enchaînez les appels MCP où la sortie d'un outil devient l'entrée d'un autre

          Le système d'agents de Magica gère l'orchestration — votre serveur MCP a juste besoin d'exposer des outils propres et bien documentés avec des schémas typés, en suivant les principes du [PAIR Guidebook](https://pair.withgoogle.com/guidebook) de Google sur la collaboration humain-IA. La plateforme s'occupe des tentatives, de la gestion des erreurs et du routage entre les serveurs.
      de:
        title: MCP-Server mit Magica erstellen
        body: |-
          # MCP-Server mit Magica erstellen

          ## Was ist MCP?

          Das [Model Context Protocol](https://modelcontextprotocol.io) (MCP) ist ein offener Standard, der es KI-Agenten ermöglicht, externe Tools, Datenquellen und Dienste über eine standardisierte Schnittstelle zu entdecken und zu nutzen. Stellen Sie es sich wie einen USB-C-Anschluss für KI vor – ein Protokoll, mit dem jeder MCP-kompatible Agent eine Verbindung zu jedem MCP-kompatiblen Server herstellen kann.

          Magica hat MCP, ursprünglich entwickelt von [Anthropic](https://anthropic.com), als seinen primären Erweiterungsmechanismus übernommen, was bedeutet, dass jeder MCP-Server, den Sie erstellen, automatisch mit dem Agentensystem von Magica funktioniert.

          ## Einrichten eines MCP-Servers

          Erstellen Sie ein neues Verzeichnis und initialisieren Sie ein TypeScript-Projekt:

          ```bash
          mkdir magica-weather-mcp && cd magica-weather-mcp
          npm init -y
          npm install @modelcontextprotocol/sdk zod
          ```

          Das MCP SDK bietet das Server-Framework. Ihr Server stellt Tools (Aktionen, die der Agent ausführen kann), Ressourcen (Daten, die der Agent lesen kann) und Prompts (Vorlagen für häufige Aufgaben) bereit.

          ## Definieren von Tools

          Tools sind die häufigsten MCP-Primitiven. Hier ist ein Wetter-Tool, das Magica-Agenten aufrufen können:

          ```typescript
          import { Server } from '@modelcontextprotocol/sdk/server/index.js'
          import { StdioServerTransport } from '@modelcontextprotocol/sdk/server/stdio.js'
          import { z } from 'zod'

          const server = new Server({ name: 'weather-mcp', version: '1.0.0' }, {
            capabilities: { tools: {} }
          })

          server.setRequestHandler('tools/list', async () => ({
            tools: [{
              name: 'get_weather',
              description: 'Get current weather for a city',
              inputSchema: {
                type: 'object',
                properties: { city: { type: 'string' } },
                required: ['city']
              }
            }]
          }))

          server.setRequestHandler('tools/call', async request => {
            if (request.params.name === 'get_weather') {
              const city = request.params.arguments?.city
              const weather = await fetchWeather(city)
              return { content: [{ type: 'text', text: JSON.stringify(weather) }] }
            }
            throw new Error('Tool not found')
          })

          const transport = new StdioServerTransport()
          await server.connect(transport)
          ```

          ## Verbinden mit Magica

          Gehen Sie in Ihrem Magica-Arbeitsbereich zu Einstellungen → MCP-Server → Server hinzufügen. Geben Sie an:

          - **Name:** Eine Bezeichnung für Ihren Server
          - **Befehl:** Der Befehl zum Starten Ihres Servers (z.B. `node dist/index.js`)
          - **Argumente:** Alle CLI-Flags, die Ihr Server benötigt
          - **Umgebungsvariablen:** API-Schlüssel, Datenbank-URLs usw.

          Nach dem Hinzufügen können Magica-Agenten Ihre Tools automatisch erkennen und aufrufen. Wenn ein Agent feststellt, dass er Daten oder eine Aktion benötigt, die Ihr Server bereitstellt, führt er den MCP-Aufruf transparent durch.

          ## Ressourcen und Kontext

          Über Tools hinaus können MCP-Server Ressourcen bereitstellen – Daten, die Agenten lesen können. Ressourcen verwenden ein URI-basiertes Adressierungsschema:

          ```typescript
          server.setRequestHandler('resources/list', async () => ({
            resources: [{
              uri: 'docs://magica/workflows',
              name: 'Workflow Documentation',
              mimeType: 'text/markdown'
            }]
          }))
          ```

          Ressourcen sind nützlich, um Agenten Zugriff auf Dokumentationen, Schemata, Referenzdaten und Konfigurationsdateien zu geben, die ihre Antworten beeinflussen.

          ## Bereitstellung

          Für die Entwicklung führen Sie Ihren MCP-Server lokal mit stdio-Transport aus. Für die Produktion stellen Sie ihn als HTTP-Server mit SSE-Transport oder über [Cloudflare Pages](https://pages.cloudflare.com) für einen serverlosen Ansatz bereit:

          ```typescript
          import { SSEServerTransport } from '@modelcontextprotocol/sdk/server/sse.js'
          import express from 'express'

          const app = express()
          app.get('/sse', async (req, res) => {
            const transport = new SSEServerTransport('/messages', res)
            await server.connect(transport)
          })
          app.post('/messages', (req, res) => {
            transport.handlePostMessage(req, res)
          })
          app.listen(3000)
          ```

          ## Fortgeschritten: Erstellen eines zusammengesetzten MCP-Servers

          Für komplexe Szenarien erstellen Sie Server, die mehrere Datenquellen zusammenfassen:

          - **Datenbank-MCP:** SQL-Abfragen als Tools mit schemabasierter Validierung bereitstellen
          - **GitHub-MCP:** Issues-API, PR-API und Actions-API zu einheitlichen Tools kombinieren
          - **Mehrschritt-Agenten:** MCP-Aufrufe verketten, bei denen die Ausgabe eines Tools zur Eingabe eines anderen wird

          Das Agentensystem von Magica übernimmt die Orchestrierung – Ihr MCP-Server muss lediglich saubere, gut dokumentierte Tools mit typisierten Schemata bereitstellen, den Prinzipien des [PAIR Guidebook](https://pair.withgoogle.com/guidebook) von Google zur Mensch-KI-Zusammenarbeit folgend. Die Plattform kümmert sich um Wiederholungen, Fehlerbehandlung und das Routing zwischen Servern.
      it:
        title: Costruire Server MCP con Magica
        body: |-
          # Costruire Server MCP con Magica

          ## Cos'è MCP?

          Il [Model Context Protocol](https://modelcontextprotocol.io) (MCP) è uno standard aperto che consente agli agenti AI di scoprire e interagire con strumenti esterni, fonti di dati e servizi attraverso un'interfaccia standardizzata. Pensalo come una porta USB-C per l'IA — un protocollo che qualsiasi agente compatibile con MCP può usare per connettersi a qualsiasi server compatibile con MCP.

          Magica ha adottato MCP, originariamente sviluppato da [Anthropic](https://anthropic.com), come meccanismo di estensione principale, il che significa che qualsiasi server MCP che costruisci funziona automaticamente con il sistema agente di Magica.

          ## Impostazione di un server MCP

          Crea una nuova directory e inizializza un progetto TypeScript:

          ```bash
          mkdir magica-weather-mcp && cd magica-weather-mcp
          npm init -y
          npm install @modelcontextprotocol/sdk zod
          ```

          L'SDK MCP fornisce il framework del server. Il tuo server espone strumenti (azioni che l'agente può eseguire), risorse (dati che l'agente può leggere) e prompt (modelli per attività comuni).

          ## Definizione degli strumenti

          Gli strumenti sono le primitive MCP più comuni. Ecco uno strumento meteo che gli agenti Magica possono chiamare:

          ```typescript
          import { Server } from '@modelcontextprotocol/sdk/server/index.js'
          import { StdioServerTransport } from '@modelcontextprotocol/sdk/server/stdio.js'
          import { z } from 'zod'

          const server = new Server({ name: 'weather-mcp', version: '1.0.0' }, {
            capabilities: { tools: {} }
          })

          server.setRequestHandler('tools/list', async () => ({
            tools: [{
              name: 'get_weather',
              description: 'Get current weather for a city',
              inputSchema: {
                type: 'object',
                properties: { city: { type: 'string' } },
                required: ['city']
              }
            }]
          }))

          server.setRequestHandler('tools/call', async request => {
            if (request.params.name === 'get_weather') {
              const city = request.params.arguments?.city
              const weather = await fetchWeather(city)
              return { content: [{ type: 'text', text: JSON.stringify(weather) }] }
            }
            throw new Error('Tool not found')
          })

          const transport = new StdioServerTransport()
          await server.connect(transport)
          ```

          ## Connessione a Magica

          Nel tuo workspace Magica, vai su Impostazioni → Server MCP → Aggiungi server. Fornisci:

          - **Nome:** Un'etichetta per il tuo server
          - **Comando:** Il comando per avviare il tuo server (es. `node dist/index.js`)
          - **Argomenti:** Qualsiasi flag CLI di cui il tuo server ha bisogno
          - **Variabili d'ambiente:** Chiavi API, URL di database, ecc.

          Una volta aggiunto, gli agenti Magica possono scoprire e chiamare automaticamente i tuoi strumenti. Quando un agente determina di aver bisogno di dati o di un'azione fornita dal tuo server, effettua la chiamata MCP in modo trasparente.

          ## Risorse e contesto

          Oltre agli strumenti, i server MCP possono esporre Risorse — dati che gli agenti possono leggere. Le risorse utilizzano uno schema di indirizzamento basato su URI:

          ```typescript
          server.setRequestHandler('resources/list', async () => ({
            resources: [{
              uri: 'docs://magica/workflows',
              name: 'Workflow Documentation',
              mimeType: 'text/markdown'
            }]
          }))
          ```

          Le risorse sono utili per dare agli agenti accesso a documentazione, schemi, dati di riferimento e file di configurazione che informano le loro risposte.

          ## Distribuzione

          Per lo sviluppo, esegui il tuo server MCP localmente con trasporto stdio. Per la produzione, distribuiscilo come server HTTP con trasporto SSE o tramite [Cloudflare Pages](https://pages.cloudflare.com) per un approccio serverless:

          ```typescript
          import { SSEServerTransport } from '@modelcontextprotocol/sdk/server/sse.js'
          import express from 'express'

          const app = express()
          app.get('/sse', async (req, res) => {
            const transport = new SSEServerTransport('/messages', res)
            await server.connect(transport)
          })
          app.post('/messages', (req, res) => {
            transport.handlePostMessage(req, res)
          })
          app.listen(3000)
          ```

          ## Avanzato: Creazione di un server MCP composito

          Per scenari complessi, costruisci server che compongono più fonti di dati:

          - **Database MCP:** Esponi query SQL come strumenti con validazione basata su schema
          - **GitHub MCP:** Combina Issues API, PR API e Actions API in strumenti unificati
          - **Agenti multi-passaggio:** Collega chiamate MCP dove l'output di uno strumento diventa l'input di un altro

          Il sistema agente di Magica gestisce l'orchestrazione — il tuo server MCP deve solo esporre strumenti puliti, ben documentati con schemi tipizzati, seguendo i principi del [PAIR Guidebook](https://pair.withgoogle.com/guidebook) di Google sulla collaborazione uomo-IA. La piattaforma si occupa di tentativi, gestione degli errori e instradamento tra server.
      ja:
        title: MagicaでMCPサーバーを構築する
        body: |-
          # Magica で MCP サーバーを構築する

          ## MCP とは

          [Model Context Protocol](https://modelcontextprotocol.io) (MCP) は、AI エージェントが標準化されたインターフェースを通じて外部のツール、データソース、サービスを発見し操作できるようにするオープンスタンダードです。これは AI における USB-C ポートのようなもので、MCP 互換のエージェントならどのエージェントでも、このプロトコルを使って MCP 互換のサーバーに接続できます。

          Magica は MCP を、もともと [Anthropic](https://anthropic.com) によって開発された主要な拡張メカニズムとして採用しており、あなたが構築する MCP サーバーは自動的に Magica のエージェントシステムで動作します。

          ## MCP サーバーのセットアップ

          新しいディレクトリを作成し、TypeScript プロジェクトを初期化します。

          ```bash
          mkdir magica-weather-mcp && cd magica-weather-mcp
          npm init -y
          npm install @modelcontextprotocol/sdk zod
          ```

          MCP SDK はサーバーフレームワークを提供します。サーバーは、ツール（エージェントが実行できるアクション）、リソース（エージェントが読み取れるデータ）、プロンプト（共通タスク用のテンプレート）を公開します。

          ## ツールの定義

          ツールは最も一般的な MCP プリミティブです。以下は Magica エージェントが呼び出せる天気ツールの例です。

          ```typescript
          import { Server } from '@modelcontextprotocol/sdk/server/index.js'
          import { StdioServerTransport } from '@modelcontextprotocol/sdk/server/stdio.js'
          import { z } from 'zod'

          const server = new Server({ name: 'weather-mcp', version: '1.0.0' }, {
            capabilities: { tools: {} }
          })

          server.setRequestHandler('tools/list', async () => ({
            tools: [{
              name: 'get_weather',
              description: 'Get current weather for a city',
              inputSchema: {
                type: 'object',
                properties: { city: { type: 'string' } },
                required: ['city']
              }
            }]
          }))

          server.setRequestHandler('tools/call', async request => {
            if (request.params.name === 'get_weather') {
              const city = request.params.arguments?.city
              const weather = await fetchWeather(city)
              return { content: [{ type: 'text', text: JSON.stringify(weather) }] }
            }
            throw new Error('Tool not found')
          })

          const transport = new StdioServerTransport()
          await server.connect(transport)
          ```

          ## Magica への接続

          Magica ワークスペースで、設定 → MCP サーバー → サーバー追加 に進みます。以下の情報を入力します。

          - **名前:** サーバーのラベル
          - **コマンド:** サーバーを起動するコマンド（例：`node dist/index.js`）
          - **引数:** サーバーが必要とする CLI フラグ
          - **環境変数:** API キー、データベース URL など

          追加後、Magica エージェントは自動的にツールを発見し呼び出せるようになります。エージェントがサーバーの提供するデータやアクションを必要と判断した場合、透過的に MCP 呼び出しが行われます。

          ## リソースとコンテキスト

          ツール以外にも、MCP サーバーはエージェントが読み取れるデータであるリソースを公開できます。リソースは URI ベースのアドレス指定方式を使用します。

          ```typescript
          server.setRequestHandler('resources/list', async () => ({
            resources: [{
              uri: 'docs://magica/workflows',
              name: 'Workflow Documentation',
              mimeType: 'text/markdown'
            }]
          }))
          ```

          リソースは、エージェントにドキュメント、スキーマ、参照データ、設定ファイルなどを提供して応答を補助するのに便利です。

          ## デプロイ

          開発時は stdio トランスポートを使用してローカルで MCP サーバーを実行します。本番環境では、SSE トランスポートを使用して HTTP サーバーとして、または [Cloudflare Pages](https://pages.cloudflare.com) を使用したサーバーレスアプローチでデプロイします。

          ```typescript
          import { SSEServerTransport } from '@modelcontextprotocol/sdk/server/sse.js'
          import express from 'express'

          const app = express()
          app.get('/sse', async (req, res) => {
            const transport = new SSEServerTransport('/messages', res)
            await server.connect(transport)
          })
          app.post('/messages', (req, res) => {
            transport.handlePostMessage(req, res)
          })
          app.listen(3000)
          ```

          ## 応用：複合 MCP サーバーの構築

          複雑なシナリオでは、複数のデータソースを合成するサーバーを構築します。

          - **データベース MCP:** SQL クエリをスキーマ認識検証付きのツールとして公開
          - **GitHub MCP:** Issues API、PR API、Actions API を統合ツールに結合
          - **マルチステップエージェント:** あるツールの出力を別のツールの入力として連鎖させる MCP 呼び出し

          Magica のエージェントシステムがオーケストレーションを処理します。MCP サーバーは、型付けされたスキーマを持つ、明確で適切に文書化されたツールを公開するだけで十分です。Google の [PAIR Guidebook](https://pair.withgoogle.com/guidebook) にある人間とAIの協働原則に従います。リトライ、エラーハンドリング、サーバー間のルーティングはプラットフォームが行います。
      zh:
        title: 使用 Magica 构建MCP服务器
        body: |-
          # 使用 Magica 构建 MCP 服务器

          ## 什么是 MCP？

          [模型上下文协议 (MCP)](https://modelcontextprotocol.io) 是一种开放标准，它允许 AI 智能体通过标准化接口发现并与外部工具、数据源和服务进行交互。可以将其视为 AI 领域的 USB-C 接口——一种协议，任何兼容 MCP 的智能体都可以用它来连接到任何兼容 MCP 的服务器。

          Magica 采用 MCP 作为其主要扩展机制，这意味着您构建的任何 MCP 服务器都能自动与 Magica 的智能体系统协同工作。

          ## 搭建 MCP 服务器

          创建一个新目录并初始化 TypeScript 项目：

          ```bash
          mkdir magica-weather-mcp && cd magica-weather-mcp
          npm init -y
          npm install @modelcontextprotocol/sdk zod
          ```

          MCP SDK 提供了服务器框架。您的服务器可以暴露工具（智能体可执行的操作）、资源（智能体可读取的数据）以及提示词模板（常见任务的模板）。

          ## 定义工具

          工具是 MCP 中最常见的原语。以下是一个可供 Magica 智能体调用的天气工具示例：

          ```typescript
          import { Server } from '@modelcontextprotocol/sdk/server/index.js'
          import { StdioServerTransport } from '@modelcontextprotocol/sdk/server/stdio.js'
          import { z } from 'zod'

          const server = new Server({ name: 'weather-mcp', version: '1.0.0' }, {
            capabilities: { tools: {} }
          })

          server.setRequestHandler('tools/list', async () => ({
            tools: [{
              name: 'get_weather',
              description: 'Get current weather for a city',
              inputSchema: {
                type: 'object',
                properties: { city: { type: 'string' } },
                required: ['city']
              }
            }]
          }))

          server.setRequestHandler('tools/call', async request => {
            if (request.params.name === 'get_weather') {
              const city = request.params.arguments?.city
              const weather = await fetchWeather(city)
              return { content: [{ type: 'text', text: JSON.stringify(weather) }] }
            }
            throw new Error('Tool not found')
          })

          const transport = new StdioServerTransport()
          await server.connect(transport)
          ```

          ## 连接到 Magica

          在您的 Magica 工作区中，前往 设置 → MCP 服务器 → 添加服务器。提供以下信息：

          - **名称：** 为您服务器设置的标签
          - **命令：** 用于启动您服务器的命令（例如 `node dist/index.js`）
          - **参数：** 您服务器所需的任何 CLI 标志
          - **环境变量：** API 密钥、数据库 URL 等。

          添加完成后，Magica 智能体可以自动发现并调用您的工具。当智能体判定其需要您服务器提供的数据或操作时，它会透明地发起 MCP 调用。

          ## 资源和上下文

          除工具外，MCP 服务器还可以暴露资源——即智能体可读取的数据。资源采用基于 URI 的寻址方案：

          ```typescript
          server.setRequestHandler('resources/list', async () => ({
            resources: [{
              uri: 'docs://magica/workflows',
              name: 'Workflow Documentation',
              mimeType: 'text/markdown'
            }]
          }))
          ```

          资源对于让智能体访问文档、模式、参考数据和配置文件非常有用，这些信息可以为其响应提供依据。

          ## 部署

          在开发环境中，使用 stdio 传输在本地运行您的 MCP 服务器。在生产环境中，则将其部署为使用 SSE 传输的 HTTP 服务器：

          ```typescript
          import { SSEServerTransport } from '@modelcontextprotocol/sdk/server/sse.js'
          import express from 'express'

          const app = express()
          app.get('/sse', async (req, res) => {
            const transport = new SSEServerTransport('/messages', res)
            await server.connect(transport)
          })
          app.post('/messages', (req, res) => {
            transport.handlePostMessage(req, res)
          })
          app.listen(3000)
          ```

          ## 进阶：构建复合型 MCP 服务器

          对于复杂场景，可以构建组合了多个数据源的服务器：

          - **数据库 MCP：** 将 SQL 查询作为具有模式感知验证功能的工具暴露
          - **GitHub MCP：** 将 Issues API、PR API 和 Actions API 整合为统一的工具
          - **多步智能体：** 将 MCP 调用串联起来，使一个工具的输出成为另一个工具的输入

          Magica 的智能体系统负责编排工作——您的 MCP 服务器只需提供带有类型化模式的、清晰且文档完善的工具即可。该平台会处理重试、错误处理以及服务器之间的路由。
