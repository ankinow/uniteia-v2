# training/scout-config.yaml
# P1.1 Scout Training — DataDesigner pipeline for scout-1000.jsonl
#
# Generates 1000 synthetic discovery queries from entity graph
# to train the scout agent (entity retrieval + graph traversal).
#
# Input:  entity-graph.json (64 nodes, 602 edges)
# Output: training/scout-1000.jsonl (1000 rows)
#
# Runtime:
#   export NVIDIA_API_KEY="nvapi-..."
#   python3 scripts/training/generate-scout-data.py
#
# Gate: Eval-D⁹ ≥ 90% (query diversity, entity coverage, edge coverage)

version: "1.0"
name: "uniteia-scout-training-p11"

model_configs:
  - alias: discovery-query
    model: nvidia/llama-3.1-nemotron-nano-8b-v1
    provider: nvidia
    inference_parameters:
      temperature: 0.8        # Higher temp = diverse queries
      top_p: 0.95
      max_tokens: 256

  - alias: expected-entities
    model: nvidia/llama-3.1-nemotron-nano-8b-v1
    provider: nvidia
    inference_parameters:
      temperature: 0.1        # Low temp = consistent entity extraction
      top_p: 0.9
      max_tokens: 512

data:
  input:
    source: entity_graph
    path: dist/entity-graph.json
    format: json

  seed_strategies:
    - type: single_entity
      description: "Query about one entity (name + type + niche)"
      weight: 0.3
      count: 300

    - type: entity_pair
      description: "Query asking about relationship between two entities"
      weight: 0.25
      count: 250

    - type: niche_summary
      description: "Query requesting overview of a niche (apex, prompt-engineering)"
      weight: 0.2
      count: 200

    - type: cross_locale
      description: "Query in non-EN locale (pt, es, fr, de, it, ja, zh)"
      weight: 0.15
      count: 150

    - type: graph_traversal
      description: "Multi-hop query requiring graph expansion (2-3 hops)"
      weight: 0.1
      count: 100

pipeline:
  stages:
    - id: seed
      type: SeedDatasetColumn
      params:
        strategy: "mix"
        seeds: user_seed.csv  # Generated by scripts/training/generate-scout-data.py

    - id: discover
      type: LLMTextColumn
      alias: discovery-query
      input_column: seed_prompt
      prompt_template: |
        Gere uma pergunta de descoberta natural em português brasileiro
        que um usuário faria sobre inteligência artificial, baseada em:
        {seed_prompt}
        A pergunta deve soar como algo que um pesquisador ou profissional
        perguntaria. Máximo 30 palavras.

    - id: extract
      type: LLMStructuredColumn
      alias: expected-entities
      input_column: discovery_query
      schema:
        type: object
        properties:
          expected_entities:
            type: array
            items:
              type: object
              properties:
                entity_id:
                  type: string
                  description: "ID da entidade no entity-graph.json"
                entity_name:
                  type: string
                relevance:
                  type: number
                  description: "Relevância 0-1 para esta query"
          expected_edge_types:
            type: array
            items:
              type: string
          difficulty:
            type: string
            enum: [easy, medium, hard]
          graph_hops:
            type: integer
            description: "Número de hops no grafo necessários"

    - id: validate
      type: ValidationColumn
      input_column: expected_entities
      rules:
        - entity_exists: "entity_id deve existir em entity-graph.json"
        - relevance_range: "relevance entre 0 e 1"
        - min_entities: "pelo menos 1 entidade esperada"
        - max_entities: "no máximo 10 entidades por query"

quality_gates:
  - dimension: query_diversity
    metric: distinct_queries / total_queries
    threshold: 0.8
  - dimension: entity_coverage
    metric: unique_entities_referenced / total_entities
    threshold: 0.7
  - dimension: edge_coverage
    metric: unique_edge_types_referenced / total_edge_types
    threshold: 0.6
  - dimension: difficulty_distribution
    metric: |
      easy (30-40%) · medium (35-45%) · hard (10-20%)
    threshold: "each bucket within range"
