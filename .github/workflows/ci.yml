name: CI — UniTeia v2 Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Translation key consistency
        run: bun run vitest run src/i18n/translation-consistency.test.ts

      - name: Unit tests
        run: bun run test:unit

      - name: Build (SSG)
        run: npx qwik build

      - name: Verify SSG page count (≥80 pages)
        run: |
          PAGE_COUNT=$(find dist -name 'index.html' | wc -l)
          echo "SSG pages generated: $PAGE_COUNT"
          if [ "$PAGE_COUNT" -lt 80 ]; then
            echo "❌ SSG page count too low: $PAGE_COUNT (minimum 80)"
            exit 1
          fi
          echo "✅ SSG page count: $PAGE_COUNT"

      - name: Verify hreflang + og:locale on SSG output
        run: |
          # Check that at least one locale page has dynamic og:locale (not hardcoded pt_BR)
          LOCALES="en pt es fr de it ja zh"
          FAIL=0
          for LOC in $LOCALES; do
            INDEX="dist/$LOC/index.html"
            if [ ! -f "$INDEX" ]; then
              echo "⚠️  No index for locale: $LOC"
              continue
            fi
            # Check hreflang tags present
            if ! grep -q 'hreflang' "$INDEX"; then
              echo "❌ Missing hreflang in $INDEX"
              FAIL=1
            fi
            # Check og:locale is present (NOT hardcoded)
            OG_LOCALE=$(grep -oP 'property="og:locale"\s+content="[^"]*"' "$INDEX" | head -1)
            if [ -z "$OG_LOCALE" ]; then
              echo "❌ Missing og:locale in $INDEX"
              FAIL=1
            fi
            # Check html lang attribute
            if ! grep -qP "html[^>]+\blang=\"$LOC\"" "$INDEX"; then
              echo "❌ Missing or wrong html lang in $INDEX (expected lang=\"$LOC\")"
              FAIL=1
            fi
            # Check skip-to-content
            if ! grep -q 'skip-to-content' "$INDEX"; then
              echo "❌ Missing skip-to-content in $INDEX"
              FAIL=1
            fi
          done
          if [ "$FAIL" -ne 0 ]; then
            echo "❌ SEO/i18n gates failed"
            exit 1
          fi
          echo "✅ hreflang, og:locale, html lang, skip-to-content: all present"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  visual-regression:
    name: Visual Regression
    needs: quality-gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Run Playwright visual tests
        run: |
          npx qwik build
          npx playwright test tests/e2e/canva-visual.spec.ts --reporter=html,json

      - name: Check visual regression flag
        if: failure()
        run: |
          echo "❌ Visual regression detected — check Playwright report (uploaded as artifact)"
          echo "To update baselines: bun run snapshot:update"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  deploy:
    name: Deploy to Cloudflare Pages
    needs: quality-gates
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          bunx wrangler pages deploy dist --project-name=uniteia-v2

  deploy-visual-test:
    name: Deploy Visual Test
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Run deploy visual test
        env:
          DEPLOY_URL: https://uniteia.com
        run: |
          bun run scripts/deploy-visual-test.ts
