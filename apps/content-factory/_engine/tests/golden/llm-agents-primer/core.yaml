spec: core/1
id: llm-agents-primer
entity: LLM Agents
type: concept-primer
lang: en
summary_one_liner: An LLM agent is a model that plans, calls tools, and observes results in a loop.
summary_short: |
  An LLM agent wraps a language model with a control loop that can decide
  to call tools, read their output, and adjust its next step. It is not a
  single prompt: it is a planner-executor that turns a goal into a sequence
  of tool calls until a stop condition is met.
value_proposition: |
  Agents trade single-shot answers for tool-backed reasoning. They shine when
  a task needs lookups, computation, or stateful follow-up across steps.
what_it_offers:
  - Tool calling and result inspection in a loop
  - Goal decomposition into intermediate sub-tasks
  - Memory of prior steps within the run
  - Stop conditions and budget control (tokens, steps, time)
  - Observability of each tool call for audit and replay
problems_solved:
  - Single-prompt LLM cannot read external state on demand
  - Hand-written multi-step pipelines do not adapt mid-run
  - Pure RAG cannot perform actions, only retrieval
target_audience: |
  Engineers and product teams building LLM features that need tool use,
  multi-step reasoning, or live data access (search, code, APIs, files).
when_it_matters: |
  When the user goal cannot be answered from a single prompt and requires
  at least one external action or stateful follow-up.
when_less_matters: |
  When a task is a one-shot transformation (translate, classify, summarize)
  with no external state and predictable output shape.
sources:
  - url: https://www.anthropic.com/research/building-effective-agents
    kind: primary
    title: Building effective agents (Anthropic)
    accessed_at: 2025-01-01T00:00:00Z
    excerpt_id: ex_001
  - url: https://platform.openai.com/docs/guides/function-calling
    kind: primary
    title: Function calling (OpenAI)
    accessed_at: 2025-01-01T00:00:00Z
    excerpt_id: ex_002
  - url: https://lilianweng.github.io/posts/2023-06-23-agent/
    kind: secondary
    title: LLM Powered Autonomous Agents (Lilian Weng)
    accessed_at: 2025-01-01T00:00:00Z
    excerpt_id: ex_003
evidence:
  - id: ex_001
    text: Anthropic distinguishes workflows (predetermined paths) from agents (LLM-driven control flow with dynamic tool use).
    url: https://www.anthropic.com/research/building-effective-agents
  - id: ex_002
    text: OpenAI documents function-calling APIs as the canonical way to expose actions to the model.
    url: https://platform.openai.com/docs/guides/function-calling
  - id: ex_003
    text: Weng frames an agent loop as planning + memory + tool use, with the model deciding the next action each step.
    url: https://lilianweng.github.io/posts/2023-06-23-agent/
takeaways:
  - Agents are loops, not prompts.
  - Tool calling is what separates a prompt from an agent.
  - Budget and stop conditions are not optional.
questions_it_answers:
  - What is an LLM agent?
  - When is an agent better than a workflow?
  - What does an agent loop actually do?
