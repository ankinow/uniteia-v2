shared:
  banned_terms:
    - revolucionário
    - o melhor
    - game changer
    - imperdível
    - garantido
    - mudará tudo
  require_evidence_for: [numbers, superlatives, dated_claims]
  min_density: 0.65

blog:
  word_count: { min: 800, max: 2400 }
  forbid_cta: true
  forbid_h1: false

wiki:
  word_count: { min: 200, max: 1200 }

short:
  hook_max_words: 14
  beats: { min: 3, max: 6 }
  beats_with_ref: { min: 1 }
  banned_openers:
    - "Did you know"
    - "Você sabia"
    - "Imagine se"

combined:
  word_count: { min: 900, max: 4000 }
  sources: { min: 2 }
  evidence: { min: 3 }
