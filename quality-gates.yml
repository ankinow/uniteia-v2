name: Quality Gates

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ship-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6
      - run: bun install
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test:unit
      - run: bun run build
      - name: Bundle Size Check
        run: |
          BUNDLE_SIZE=$(gzip -c dist/build/q-*.js | wc -c)
          echo "Bundle size: $BUNDLE_SIZE bytes"
          if [ $BUNDLE_SIZE -gt 87040 ]; then
            echo "❌ Bundle exceeds 87KB cap ($BUNDLE_SIZE bytes)"
            exit 1
          else
            echo "✅ Bundle within budget ($BUNDLE_SIZE bytes)"
          fi
      - name: 8-Locale Symmetry Check
        run: bun run ship:check
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  visual-regression:
    runs-on: ubuntu-latest
    needs: ship-check
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6
      - run: bun install
      - run: bun run build
      - name: Install Playwright
        run: bunx playwright install chromium
      - name: Run Visual Tests
        run: bun run test:e2e
      - name: Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff
          path: test-results/
